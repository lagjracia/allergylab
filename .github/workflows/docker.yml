name: AllergyLab CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        name: Checkout source
      - name: Build images
        run: |
          cd part7a
          docker build -t allergylab:latest .
      - name: Run Tests
        run: |
          docker run --rm allergylab:latest pytest tests/
      - name: Log in to Docker
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Push images to DockerHub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/al-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/al-db-loader:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/al-email:latest